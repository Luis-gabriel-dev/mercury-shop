spring:
  application:
    name: mercury-shop
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mercury_shop_db}
    username: ${DB_USER:mercury}
    password: ${DB_PASSWORD:mercury}
  jpa:
    open-in-view: false
    hibernate:
      # O schema é de responsabilidade exclusiva do Flyway; nunca 'update' (briefing seção 9).
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:mercury}
    password: ${RABBITMQ_PASSWORD:mercury}
    template:
      # Propaga o contexto de trace (traceparent) nos headers da mensagem ao publicar (Fase 9).
      observation-enabled: true
    listener:
      simple:
        # Ao esgotar as tentativas, rejeita sem requeue → vai para a DLQ via x-dead-letter-exchange.
        default-requeue-rejected: false
        # Continua o trace do publicador ao consumir → correlaciona api(relay)→worker.
        observation-enabled: true
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 200ms
          multiplier: 2
  cache:
    type: redis
    redis:
      time-to-live: 10m

server:
  port: 8080

# Actuator: health + métricas Prometheus. Em prod o /actuator NÃO é roteado pelo Caddy
# (Prometheus faz scrape pela rede interna do compose) — briefing seção 7.4.
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true
  # Tracing distribuído (Fase 9): amostra tudo (demo) e injeta traceId/spanId no MDC dos logs.
  # O envio de spans fica DESLIGADO por padrão (sem backend em dev/test); o perfil prod liga e
  # aponta o OTLP para o Tempo. A propagação de contexto (api→worker) funciona independentemente.
  tracing:
    sampling:
      probability: 1.0
    export:
      enabled: false

# OpenAPI/Swagger desligado por padrão; o perfil dev liga (briefing seção 7.4).
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
    path: /swagger-ui.html

# Configuração de segurança da aplicação. Chaves/segredos sempre via env (briefing 7.7).
mercury:
  security:
    jwt:
      issuer: mercury-shop
      access-token-ttl: 15m
      # PEM RSA (PKCS#8 / X.509). Vazio em dev/test => par efêmero gerado no boot.
      private-key: ${JWT_PRIVATE_KEY:}
      public-key: ${JWT_PUBLIC_KEY:}
    refresh-token-ttl: 7d
    login:
      max-attempts: 5
      lock-duration: 15m
    rate-limit:
      capacity: 10
      refill-period: 1m
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  messaging:
    consumers:
      # API de produção roda com 'false' (só publica); o serviço worker, com 'true'.
      enabled: ${MERCURY_MESSAGING_CONSUMERS_ENABLED:true}
  outbox:
    # Intervalo do relay que publica os eventos pendentes do outbox no RabbitMQ.
    poll-delay: 1000
    # Retenção de eventos já publicados; o purger agendado remove os mais antigos que isto.
    retention: 7d
    # Intervalo do purger de eventos publicados antigos (ms).
    purge-delay: 3600000
  orders:
    # Reserva de estoque: pedido PENDING não pago dentro desta janela é cancelado (estoque devolvido).
    payment-window: 30m
    # Intervalo do sweeper que expira pedidos PENDING vencidos.
    sweep-delay: 60000
  payment:
    # 'stub' (dev/test, sem credenciais) ou 'stripe' (gateway real). Segredos sempre via env.
    provider: ${MERCURY_PAYMENT_PROVIDER:stub}
    currency: ${MERCURY_PAYMENT_CURRENCY:brl}
    stripe:
      secret-key: ${STRIPE_SECRET_KEY:}
      webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
      # Timeouts de rede do cliente Stripe (ms); o retry fica a cargo do Resilience4j.
      connect-timeout-ms: ${STRIPE_CONNECT_TIMEOUT_MS:5000}
      read-timeout-ms: ${STRIPE_READ_TIMEOUT_MS:8000}

# Resiliência no gateway de pagamento (Fase 10): retry para falhas transitórias e circuit breaker
# para fail-fast quando o gateway está fora. Instância 'paymentGateway' usada pelo ResilientPaymentGateway.
resilience4j:
  retry:
    instances:
      paymentGateway:
        max-attempts: 3
        wait-duration: 300ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
  circuitbreaker:
    instances:
      paymentGateway:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 3

---
spring:
  config:
    activate:
      on-profile: dev

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

# DEV: cria/promove um ADMIN já ativo para teste manual (login direto, sem verificar e-mail).
mercury:
  dev:
    admin-email: admin@mercury.dev
    admin-password: Adm1n!Passw0rd

---
spring:
  config:
    activate:
      on-profile: prod
  # Em prod as migrations são aplicadas por um passo dedicado (serviço 'migrate' no compose) ANTES
  # das réplicas subirem — o app não migra no boot, apenas valida o schema (ddl-auto: validate).
  # Desacopla o deploy do boot e evita N réplicas disputando a migração. Dev/test seguem migrando.
  flyway:
    enabled: false

# Em prod o Swagger/OpenAPI permanece desligado (herda os defaults acima, reforçado aqui).
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# Logs estruturados em JSON (formato ECS) — recurso nativo do Spring Boot 3.4; inclui o requestId
# e, com o tracing ligado, também traceId/spanId (correlação log↔trace).
logging:
  structured:
    format:
      console: ecs

# Em prod os spans são exportados via OTLP para o Tempo (rede interna do compose).
management:
  tracing:
    export:
      enabled: true
  otlp:
    tracing:
      endpoint: ${OTLP_TRACING_ENDPOINT:http://tempo:4318/v1/traces}

# Atrás do Caddy (TLS terminado no proxy): respeita X-Forwarded-* para esquema/Secure corretos.
server:
  forward-headers-strategy: framework
