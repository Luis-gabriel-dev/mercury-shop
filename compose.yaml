# Infra mínima de desenvolvimento (Fase 1): apenas Postgres.
# O compose completo (Redis, RabbitMQ, Prometheus, Grafana, Caddy) entra na Fase 5.
services:
  postgres:
    image: postgres:16-alpine
    container_name: mercury-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mercury_shop_db}
      POSTGRES_USER: ${POSTGRES_USER:-mercury}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mercury}
    ports:
      - "5432:5432"
    volumes:
      - mercury-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mercury} -d ${POSTGRES_DB:-mercury_shop_db}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mercury-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - mercury-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: mercury-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-mercury}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-mercury}
    ports:
      - "5672:5672"
      - "15672:15672"   # painel de gerenciamento (apenas dev)
    volumes:
      - mercury-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mercury-pg-data:
  mercury-redis-data:
  mercury-rabbitmq-data:
