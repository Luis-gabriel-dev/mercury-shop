name: Release

# Ao empurrar uma tag semver (ex.: v1.2.3): escaneia a imagem (Trivy) e gera o SBOM (CycloneDX),
# publica no GitHub Container Registry (GHCR) e — quando habilitado — faz deploy na VPS.
# O CI (ci.yml) continua validando build+testes em cada push.
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # necessário para push no GHCR
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # token efêmero do próprio runner

      # Deriva tags/labels da imagem a partir da tag git (semver + latest).
      - name: Metadados da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mercury-shop
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      # Build local (carregado no daemon) para escanear ANTES de publicar — imagem vulnerável não sobe.
      - name: Build da imagem (load local)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: mercury-shop:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Scan de vulnerabilidades da imagem + base OS (complementa o dependency-review, que só vê deps em PR).
      - name: Trivy — vulnerabilidades da imagem
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: mercury-shop:scan
          format: table
          exit-code: "1"                 # falha em vulnerabilidade corrigível de severidade alta/crítica
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      # SBOM (CycloneDX): inventário dos componentes da imagem, para auditoria/compliance.
      - name: Trivy — SBOM (CycloneDX)
        if: always()
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: mercury-shop:scan
          scan-type: image
          format: cyclonedx
          output: sbom.cdx.json

      - name: Publica o SBOM como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          if-no-files-found: ignore

      # Só publica depois do scan passar (cache reaproveitado → push quase instantâneo).
      - name: Push para o GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy na VPS: puxa a nova imagem e recria os serviços via compose. Fica DESLIGADO por padrão
  # (variável de repositório DEPLOY_ENABLED != 'true') até que os segredos do servidor existam —
  # assim o publish acima funciona de imediato e o deploy é ativado quando a infra estiver pronta.
  deploy:
    needs: publish
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    environment: production
    steps:
      - name: Deploy por SSH (docker compose pull && up -d)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            docker compose pull
            docker compose up -d --remove-orphans