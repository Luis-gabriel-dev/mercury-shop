name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Tornar o wrapper executável
        run: chmod +x mvnw

      # Os runners ubuntu-latest têm Docker → os testes de integração (Testcontainers
      # Postgres + Redis + RabbitMQ) rodam normalmente.
      - name: Build e testes
        run: ./mvnw -B verify

      - name: Validar build da imagem Docker
        run: docker build -t mercury-shop:ci .

  # Scan de dependências (Fase 8): em PRs, falha se forem introduzidas dependências com
  # vulnerabilidades de severidade alta/crítica. Nativo do GitHub — sem credenciais nem NVD.
  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
