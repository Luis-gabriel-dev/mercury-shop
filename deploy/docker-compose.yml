# Stack completa de produção (Fase 5): Caddy (HTTPS) → API replicada + worker separado,
# Postgres/Redis/RabbitMQ/Prometheus internos, Grafana para observabilidade.
# Uso: a partir de deploy/  ->  docker compose up -d --build
name: mercury-shop

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
    networks: [mercury]

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MERCURY_MESSAGING_CONSUMERS_ENABLED: "false"   # API só publica; quem consome é o worker
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-mercury_shop_db}
      DB_USER: ${POSTGRES_USER:-mercury}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?defina no .env}
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-mercury}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?defina no .env}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:?defina no .env}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:?defina no .env}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://mercury-shop.adastratech.dev}
    expose:
      - "8080"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    deploy:
      replicas: 2          # stateless → escalável (Caddy faz balanceamento via DNS)
    networks: [mercury]

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MERCURY_MESSAGING_CONSUMERS_ENABLED: "true"    # consome as filas (e-mail, OrderPaid)
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-mercury_shop_db}
      DB_USER: ${POSTGRES_USER:-mercury}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?defina no .env}
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-mercury}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?defina no .env}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:?defina no .env}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:?defina no .env}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks: [mercury]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mercury_shop_db}
      POSTGRES_USER: ${POSTGRES_USER:-mercury}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina no .env}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mercury} -d ${POSTGRES_DB:-mercury_shop_db}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [mercury]   # sem ports: só acessível internamente

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [mercury]

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-mercury}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?defina no .env}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [mercury]

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks: [mercury]   # interno: faz scrape de api/worker :8080/actuator/prometheus

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"        # painel para o operador (não é o proxy público da API)
    depends_on:
      - prometheus
    networks: [mercury]

networks:
  mercury:

volumes:
  caddy-data:
  caddy-config:
  pg-data:
  redis-data:
  rabbitmq-data:
  prometheus-data:
  grafana-data:
