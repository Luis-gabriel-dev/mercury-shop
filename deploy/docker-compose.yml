# Stack completa de produção (Fase 5): Caddy (HTTPS) → API replicada + worker separado,
# Postgres/Redis/RabbitMQ/Prometheus internos, Grafana para observabilidade.
# Uso: a partir de deploy/  ->  docker compose up -d --build
name: mercury-shop

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
    networks: [mercury]

  # Migrations (Fase 11): passo dedicado que roda o Flyway UMA vez contra o Postgres antes das
  # réplicas subirem. Aplica o schema de forma controlada e desacopla o boot do app (que roda com
  # flyway.enabled=false e apenas valida). Idempotente: re-deploys aplicam só o que faltar.
  migrate:
    image: flyway/flyway:10-alpine
    command:
      - -url=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-mercury_shop_db}
      - -user=${POSTGRES_USER:-mercury}
      - -password=${POSTGRES_PASSWORD:?defina no .env}
      - -connectRetries=30
      - migrate
    volumes:
      - ../src/main/resources/db/migration:/flyway/sql:ro   # V1..V9 (default location do Flyway)
    depends_on:
      postgres: { condition: service_healthy }
    restart: "no"
    networks: [mercury]

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MERCURY_MESSAGING_CONSUMERS_ENABLED: "false"   # API só publica; quem consome é o worker
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-mercury_shop_db}
      DB_USER: ${POSTGRES_USER:-mercury}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?defina no .env}
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-mercury}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?defina no .env}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:?defina no .env}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:?defina no .env}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://mercury-shop.adastratech.dev}
    expose:
      - "8080"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }   # schema pronto antes de subir
    deploy:
      replicas: 2          # stateless → escalável (Caddy faz balanceamento via DNS)
    networks: [mercury]

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MERCURY_MESSAGING_CONSUMERS_ENABLED: "true"    # consome as filas (e-mail, OrderPaid)
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-mercury_shop_db}
      DB_USER: ${POSTGRES_USER:-mercury}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?defina no .env}
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-mercury}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?defina no .env}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:?defina no .env}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:?defina no .env}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }   # schema pronto antes de subir
    networks: [mercury]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mercury_shop_db}
      POSTGRES_USER: ${POSTGRES_USER:-mercury}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina no .env}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mercury} -d ${POSTGRES_DB:-mercury_shop_db}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [mercury]   # sem ports: só acessível internamente

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [mercury]

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-mercury}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?defina no .env}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      # Habilita o plugin rabbitmq_prometheus (métricas por fila na porta 15692) — Fase 9.
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [mercury]

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - alertmanager
    networks: [mercury]   # interno: faz scrape de api/worker :8080/actuator/prometheus e do rabbitmq

  # Alertmanager (Fase 9): recebe os alertas do Prometheus e os despacha (receiver sem segredos).
  alertmanager:
    image: prom/alertmanager:latest
    restart: unless-stopped
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    networks: [mercury]   # interno; o operador acessa via Grafana ou porta encaminhada sob demanda

  # Tempo (Fase 9): backend de traces. Recebe spans OTLP da api/worker e é consultado pelo Grafana.
  tempo:
    image: grafana/tempo:latest
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    networks: [mercury]   # interno: OTLP :4318/:4317, consulta :3200

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"        # painel para o operador (não é o proxy público da API)
    depends_on:
      - prometheus
      - tempo
    networks: [mercury]

networks:
  mercury:

volumes:
  caddy-data:
  caddy-config:
  pg-data:
  redis-data:
  rabbitmq-data:
  prometheus-data:
  alertmanager-data:
  tempo-data:
  grafana-data:
