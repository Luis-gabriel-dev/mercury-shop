# Grafana Tempo — backend de traces (Fase 9). Recebe spans via OTLP (HTTP :4318 / gRPC :4317),
# armazena localmente e é consultado pelo Grafana (datasource Tempo). Só na rede interna do compose.
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        http:   # api/worker exportam para http://tempo:4318/v1/traces
        grpc:

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 24h   # demo: retém traces por 24h

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal