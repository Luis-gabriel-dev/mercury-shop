# Alertmanager (Fase 9): agrupa e despacha os alertas do Prometheus.
# O receiver padrão NÃO tem integração externa — assim nenhum segredo (webhook Slack, SMTP)
# entra no repositório. Para notificar de verdade, configure via variáveis de ambiente/arquivo
# secreto e descomente o exemplo de Slack abaixo.
route:
  receiver: default
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers: [severity = "critical"]
      receiver: default
      repeat_interval: 1h

receivers:
  - name: default
    # slack_configs:
    #   - api_url_file: /etc/alertmanager/slack_url          # segredo montado, fora do Git
    #     channel: '#mercury-alerts'
    #     send_resolved: true

inhibit_rules:
  # Um crítico ativo silencia o warning equivalente do mesmo alerta.
  - source_matchers: [severity = "critical"]
    target_matchers: [severity = "warning"]
    equal: [alertname]